<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlanta Food Circular Network</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.30/"></script>

  <style>
    /* ═══════════════════════════════════════════════════════
       CORE VARIABLES
       ═══════════════════════════════════════════════════════ */
    :root {
      --header-h: 64px;
      --bg-dark: #07090f;
      --text: #e6ecf5;
      --muted: #9ca6b8;
      --gold: #b3a369;

      --food-recovery: #e53935;
      --redistribution: #1e88e5;
      --beneficiary: #43a047;
      --compost-network: #8d6e63;
      --food-desert: #ff5722;
      --food-insecurity: #ab47bc;

      --gt-dining: #f4d35e;
      --gt-compost: #4caf50;
      --gt-vending: #f57c00;
      --gt-recycling: #29b6f6;
      --gt-buildings: #d4c9a8;
      --gt-sidewalks: #b3a369;
    }

    /* ═══════════════════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════════════════ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #app {
      width: 100%; height: 100%; overflow: hidden;
      font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
    }

    #app { position: relative; background: #0c1118; color: var(--text); }

    /* ═══════════════════════════════════════════════════════
       TOPBAR
       ═══════════════════════════════════════════════════════ */
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 30;
      height: var(--header-h); background: var(--bg-dark);
      border-bottom: 1px solid #222a3b;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px;
    }

    #brandWrap { display: flex; align-items: center; gap: 10px; min-width: 0; }

    #logoWrap {
      width: 150px; height: 42px; border: none; border-radius: 8px;
      background: transparent; overflow: hidden; flex-shrink: 0;
    }
    #logoWrap img { width: 100%; height: 100%; object-fit: contain; display: block; }

    #titleWrap { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; min-width: 0; }
    #titleWrap h1 { font-size: 27px; line-height: 1; font-weight: 700; color: #ffffff; }

    #i2ceLink { color: #d6c890; text-decoration: none; font-weight: 700; font-size: 13px; }
    #i2ceLink:hover { color: #f2e7bd; text-decoration: underline; }

    #topbarRight { display: flex; align-items: center; gap: 10px; }

    .navLink {
      color: #b3a369; text-decoration: none; font-size: 12px; font-weight: 700;
      padding: 8px 14px; border: 1px solid rgba(179, 163, 105, 0.5); border-radius: 999px;
      white-space: nowrap; transition: background 0.2s;
    }
    .navLink:hover { background: rgba(179, 163, 105, 0.12); }

    #modeToggle { display: inline-flex; border: 1px solid #3a4254; border-radius: 999px; overflow: hidden; }
    #modeToggle button {
      border: 0; background: #141924; color: #d8dde6;
      padding: 8px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    #modeToggle button.active { background: var(--gold); color: #1d232c; }

    /* ═══════════════════════════════════════════════════════
       MAP & STATS
       ═══════════════════════════════════════════════════════ */
    #viewDiv { position: absolute; inset: 0; }

    #statsRail {
      position: absolute; top: 72px; right: 10px; z-index: 24;
      display: grid; gap: 6px; width: 220px;
    }
    .statCard {
      background: rgba(10, 14, 22, 0.88); border: 1px solid #2b3446;
      border-radius: 8px; padding: 7px 10px;
    }
    .statLabel { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
    .statValue { margin-top: 3px; font-size: 17px; font-weight: 800; color: #ffffff; }

    /* ═══════════════════════════════════════════════════════
       LAYER PANEL
       ═══════════════════════════════════════════════════════ */
    #layersToggle {
      position: absolute; left: 12px; bottom: 88px; z-index: 26;
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid #2d3442; background: #05080d; color: #ffffff; cursor: pointer;
    }

    #layerPanel {
      position: absolute; top: 74px; left: 12px; z-index: 25;
      width: 300px; max-height: calc(100vh - 170px); overflow-y: auto;
      background: rgba(5, 8, 13, 0.95); border: 1px solid #2d3442;
      border-radius: 10px; padding: 10px; display: none;
    }
    #layerPanel.open { display: block; }

    .panelHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .panelHeader h3 { font-size: 12px; color: #aab4c6; text-transform: uppercase; letter-spacing: 0.5px; }

    .panelBtn {
      border: 1px solid #3a4254; background: #101621; color: #d8dde6;
      font-size: 10px; font-weight: 700; border-radius: 6px; padding: 4px 6px; cursor: pointer;
    }

    .groupTitle {
      margin: 9px 0 6px; font-size: 11px; color: #8e98aa;
      text-transform: uppercase; font-weight: 700; letter-spacing: 0.4px;
    }

    .layerRow, .layerStatic { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 12px; }
    .layerRow input { width: 14px; height: 14px; accent-color: var(--gold); cursor: pointer; }
    .layerStatic { color: #c7d0df; opacity: 0.9; }

    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot.line { width: 14px; height: 4px; border-radius: 4px; }
    .dot.poly { border-radius: 2px; border: 1px solid #757d8f; }

    /* ═══════════════════════════════════════════════════════
       DOCK (BOTTOM TABS)
       ═══════════════════════════════════════════════════════ */
    #dock {
      position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 24;
      display: flex; gap: 6px; max-width: calc(100vw - 24px); overflow-x: auto;
      padding: 6px; border-radius: 12px; background: rgba(6, 7, 8, 0.96); border: 1px solid #252d3d;
    }
    #dock button {
      border: 0; background: transparent; color: #d2d9e5;
      padding: 10px 12px; border-radius: 8px; font-size: 12px; font-weight: 700;
      white-space: nowrap; cursor: pointer;
    }
    #dock button.active { background: #4f6872; color: #ffffff; }

    /* ═══════════════════════════════════════════════════════
       MOBILE RESPONSIVE
       ═══════════════════════════════════════════════════════ */
    @media (max-width: 760px) {
      #topbar {
        height: 82px; flex-direction: column; align-items: flex-start;
        justify-content: center; gap: 4px;
      }
      #logoWrap { width: 120px; height: 34px; }
      #titleWrap h1 { font-size: 20px; }
      #statsRail { top: 90px; right: 8px; width: 160px; }
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- ═══ TOPBAR ═══ -->
    <header id="topbar">
      <div id="brandWrap">
        <div id="logoWrap">
          <img src="/resources/GT%20logo/Primary%20Logos/Georgia%20Tech%20One%20Line/GTOneLine_White.svg" alt="GT logo" />
        </div>
        <div id="titleWrap">
          <h1>Atlanta Food Circular Network</h1>
          <a id="i2ceLink" href="https://sites.gatech.edu/i2ce/" target="_blank" rel="noopener">
            Georgia Tech Circular Economy Lab [I2CE]
          </a>
        </div>
      </div>
      <div id="topbarRight">
        <a href="surplus-map.html" class="navLink">Surplus Map</a>
        <a href="fleet-analytics.html" class="navLink">Fleet Analytics</a>
        <a href="gt-campus-hub.html" class="navLink">Campus Hub</a>
        <div id="modeToggle">
          <button id="btnCity" class="active" type="button">Atlanta</button>
          <button id="btnCampus" type="button">GT Campus</button>
        </div>
      </div>
    </header>

    <!-- ═══ MAP ═══ -->
    <div id="viewDiv"></div>
    <section id="statsRail"></section>
    <button id="layersToggle" type="button">L</button>

    <!-- ═══ LAYER PANEL ═══ -->
    <aside id="layerPanel">
      <div class="panelHeader">
        <h3>Layers</h3>
        <div>
          <button class="panelBtn" id="showAll" type="button">Show All</button>
          <button class="panelBtn" id="hideAll" type="button">Hide All</button>
        </div>
      </div>

      <div class="groupTitle">Atlanta Network</div>
      <label class="layerRow"><input type="checkbox" data-layer="foodRecovery" checked /><span class="dot" style="background: var(--food-recovery)"></span><span>Food Recovery Sources</span></label>
      <label class="layerRow"><input type="checkbox" data-layer="redistribution" checked /><span class="dot" style="background: var(--redistribution)"></span><span>Redistribution Nodes</span></label>
      <label class="layerRow"><input type="checkbox" data-layer="beneficiary" /><span class="dot" style="background: var(--beneficiary)"></span><span>Beneficiary Access Points</span></label>
      <label class="layerRow"><input type="checkbox" data-layer="circular" checked /><span class="dot" style="background: var(--compost-network)"></span><span>Circular/Compost Network</span></label>
      <label class="layerRow"><input type="checkbox" data-layer="foodDeserts" /><span class="dot poly" style="background: var(--food-desert)"></span><span>Food Deserts</span></label>
      <label class="layerRow"><input type="checkbox" data-layer="foodInsecurity" /><span class="dot poly" style="background: var(--food-insecurity)"></span><span>Food Insecurity (CDC)</span></label>

      <div class="groupTitle">GT Campus Layers (I2CE)</div>
      <label class="layerRow"><input type="checkbox" data-layer="gtDining" checked /><span class="dot" style="background: var(--gt-dining)"></span><span>Campus Dining</span></label>
      <label class="layerRow"><input type="checkbox" data-layer="gtCompost" checked /><span class="dot" style="background: var(--gt-compost)"></span><span>Compost Locations</span></label>
      <label class="layerRow"><input type="checkbox" data-layer="gtVending" checked /><span class="dot" style="background: var(--gt-vending)"></span><span>Vending Machines</span></label>
      <label class="layerRow"><input type="checkbox" data-layer="gtRecycling" checked /><span class="dot" style="background: var(--gt-recycling)"></span><span>Recycling / Trash Cans</span></label>

      <div class="groupTitle">GT Base Map (Auto in GT Mode)</div>
      <div class="layerStatic"><span class="dot poly" style="background: var(--gt-buildings)"></span><span>Buildings</span></div>
      <div class="layerStatic"><span class="dot line" style="background: var(--gt-sidewalks)"></span><span>Sidewalks</span></div>
    </aside>

    <!-- ═══ DOCK ═══ -->
    <nav id="dock"></nav>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════
       CONSTANTS
       ═══════════════════════════════════════════════════════ */
    const BASE_URL = `${window.location.origin}/geojson`;
    const CITY_VIEW = { center: [-84.388, 33.749], zoom: 11 };
    const CAMPUS_VIEW = { center: [-84.3963, 33.7756], zoom: 15 };

    const STATS = [
      { label: "Food Diverted (lbs/wk)", value: 42500 },
      { label: "Active Sources", value: 18 },
      { label: "Redistribution Nodes", value: 15 },
      { label: "People Served", value: 3200 },
      { label: "CO2 Saved (kg/wk)", value: 8900 }
    ];

    const statsRail = document.getElementById("statsRail");
    STATS.forEach((s) => {
      const card = document.createElement("article");
      card.className = "statCard";
      card.innerHTML = `<div class="statLabel">${s.label}</div><div class="statValue">${Number(s.value).toLocaleString("en-US")}</div>`;
      statsRail.appendChild(card);
    });

    /* ═══════════════════════════════════════════════════════
       ArcGIS AMD MODULES
       ═══════════════════════════════════════════════════════ */
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/GeoJSONLayer",
      "esri/widgets/Home",
      "esri/widgets/Compass",
      "esri/widgets/ScaleBar",
      "esri/widgets/Search",
      "esri/layers/FeatureLayer"
    ], function (Map, MapView, GeoJSONLayer, Home, Compass, ScaleBar, Search, FeatureLayer) {

      /* ═══════════════════════════════════════════════════════
         LAYER DEFINITIONS
         ═══════════════════════════════════════════════════════ */
      function pointRenderer(color, outline, size) {
        return { type: "simple", symbol: { type: "simple-marker", style: "circle", color, size, outline: { color: outline, width: 1.1 } } };
      }
      function lineRenderer(color, width) {
        return { type: "simple", symbol: { type: "simple-line", color, width } };
      }
      function polygonRenderer(fill, outline, width) {
        return { type: "simple", symbol: { type: "simple-fill", color: fill, outline: { color: outline, width } } };
      }
      function clusterConfig() {
        return {
          type: "cluster", clusterRadius: "58px", clusterMinSize: "22px", clusterMaxSize: "44px",
          popupTemplate: { title: "{cluster_count} features", content: "Zoom in to see individual locations." },
          labelingInfo: [{ labelExpressionInfo: { expression: "$feature.cluster_count" }, symbol: { type: "text", color: "#ffffff", font: { size: 11, weight: "bold" } }, labelPlacement: "center-center" }]
        };
      }

      const layers = {
        foodRecovery: new GeoJSONLayer({ id: "foodRecovery", title: "Food Recovery Sources", url: `${BASE_URL}/food_recovery_sources.geojson`, visible: true, renderer: pointRenderer("#e53935", "#9a1d1d", 8), popupTemplate: { title: "{display_name}", content: [{ type: "fields" }] } }),
        redistribution: new GeoJSONLayer({ id: "redistribution", title: "Redistribution Nodes", url: `${BASE_URL}/redistribution_nodes.geojson`, visible: true, renderer: pointRenderer("#1e88e5", "#155da0", 9), popupTemplate: { title: "{display_name}", content: [{ type: "fields" }] } }),
        beneficiary: new GeoJSONLayer({ id: "beneficiary", title: "Beneficiary Access Points", url: `${BASE_URL}/beneficiary_access_points.geojson`, visible: false, renderer: pointRenderer("#43a047", "#2e7032", 8), popupTemplate: { title: "{display_name}", content: [{ type: "fields" }] } }),
        circular: new GeoJSONLayer({ id: "circular", title: "Circular/Compost Network", url: `${BASE_URL}/circular_economy.geojson`, visible: true, renderer: pointRenderer("#8d6e63", "#5f4b44", 9), popupTemplate: { title: "{display_name}", content: [{ type: "fields" }] } }),
        foodDeserts: new GeoJSONLayer({
          id: "foodDeserts", title: "Food Deserts – Atlanta", url: `${BASE_URL}/food_deserts_atlanta.geojson`, visible: false,
          renderer: { type: "unique-value", field: "is_food_desert", defaultSymbol: { type: "simple-fill", color: [200, 200, 200, 0.05], outline: { color: [150, 150, 150, 0.2], width: 0.5 } }, uniqueValueInfos: [{ value: "Yes", symbol: { type: "simple-fill", color: [255, 87, 34, 0.35], outline: { color: [255, 87, 34, 0.7], width: 1 } } }] },
          popupTemplate: { title: "Tract {tract_name}", content: [{ type: "fields" }] }
        }),
        foodInsecurity: new FeatureLayer({
          id: "foodInsecurity", title: "Food Insecurity (CDC PLACES)",
          url: "https://services3.arcgis.com/ZvidGQkLaDJxRSJ2/arcgis/rest/services/PLACES_LocalData_for_BetterHealth/FeatureServer/3",
          definitionExpression: "StateAbbr = 'GA' AND (CountyName = 'Fulton' OR CountyName = 'DeKalb')", visible: false,
          renderer: { type: "class-breaks", field: "FOODINSECU_CrudePrev", defaultSymbol: { type: "simple-fill", color: [171, 71, 188, 0.1], outline: { color: [171, 71, 188, 0.2], width: 0.5 } },
            classBreakInfos: [
              { minValue: 0, maxValue: 15, symbol: { type: "simple-fill", color: [171, 71, 188, 0.1], outline: { color: [171, 71, 188, 0.3], width: 0.5 } } },
              { minValue: 15, maxValue: 25, symbol: { type: "simple-fill", color: [171, 71, 188, 0.35], outline: { color: [171, 71, 188, 0.5], width: 0.8 } } },
              { minValue: 25, maxValue: 100, symbol: { type: "simple-fill", color: [171, 71, 188, 0.6], outline: { color: [171, 71, 188, 0.8], width: 1 } } }
            ]
          },
          popupTemplate: { title: "Tract {TractFIPS}", content: [{ type: "fields", fieldInfos: [
            { fieldName: "FOODINSECU_CrudePrev", label: "Food Insecurity %" },
            { fieldName: "FOODSTAMP_CrudePrev", label: "Food Stamps %" },
            { fieldName: "CountyName", label: "County" },
            { fieldName: "TotalPopulation", label: "Population" }
          ] }] }
        }),
        gtDining: new GeoJSONLayer({ id: "gtDining", title: "GT Campus Dining", url: `${BASE_URL}/campus_dining.geojson`, visible: false, renderer: pointRenderer("#f4d35e", "#bd9526", 10), popupTemplate: { title: "{Restaurant}", content: [{ type: "fields" }] } }),
        gtCompost: new GeoJSONLayer({ id: "gtCompost", title: "GT Compost", url: `${BASE_URL}/compost_locations.geojson`, visible: false, renderer: pointRenderer("#4caf50", "#2e7d32", 9), popupTemplate: { title: "GT Compost", content: [{ type: "fields" }] } }),
        gtVending: new GeoJSONLayer({ id: "gtVending", title: "GT Vending", url: `${BASE_URL}/vending_machines.geojson`, visible: false, renderer: pointRenderer("#f57c00", "#af5600", 8), popupTemplate: { title: "GT Vending", content: [{ type: "fields" }] } }),
        gtRecycling: new GeoJSONLayer({ id: "gtRecycling", title: "GT Recycling", url: `${BASE_URL}/recycling_trash_cans.geojson`, visible: false, renderer: pointRenderer("#29b6f6", "#1c86b5", 8), popupTemplate: { title: "GT Recycling / Trash", content: [{ type: "fields" }] } }),
        gtBuildings: new GeoJSONLayer({ id: "gtBuildings", title: "GT Buildings", url: `${BASE_URL}/buildings.geojson`, visible: false, renderer: polygonRenderer([212, 201, 168, 0.55], [142, 121, 79, 1], 0.5), popupTemplate: { title: "{Name}", content: [{ type: "fields" }] } }),
        gtSidewalks: new GeoJSONLayer({ id: "gtSidewalks", title: "GT Sidewalks", url: `${BASE_URL}/sidewalks.geojson`, visible: false, renderer: lineRenderer("#b3a369", 1.1), popupTemplate: { title: "GT Sidewalk", content: [{ type: "fields" }] } })
      };

      const atlantaBoundaryLayer = new FeatureLayer({
        url: "https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/tigerWMS_Current/MapServer/28",
        definitionExpression: "GEOID = '1304000'",
        renderer: polygonRenderer([255, 255, 255, 0.03], [179, 163, 105, 0.6], 2),
        title: "City of Atlanta Boundary", visible: true
      });

      /* ═══════════════════════════════════════════════════════
         MAP & VIEW
         ═══════════════════════════════════════════════════════ */
      const atlantaLayers = [layers.foodRecovery, layers.redistribution, layers.beneficiary, layers.circular, layers.foodDeserts, layers.foodInsecurity];
      const gtLayers = [layers.gtDining, layers.gtCompost, layers.gtVending, layers.gtRecycling];
      const gtBaseLayers = [layers.gtBuildings, layers.gtSidewalks];

      const map = new Map({
        basemap: "dark-gray-vector",
        layers: [
          atlantaBoundaryLayer,
          layers.foodDeserts, layers.foodInsecurity,
          layers.gtSidewalks, layers.gtBuildings,
          layers.foodRecovery, layers.redistribution, layers.beneficiary, layers.circular,
          layers.gtRecycling, layers.gtDining, layers.gtVending, layers.gtCompost
        ]
      });

      const view = new MapView({
        container: "viewDiv", map,
        center: CITY_VIEW.center, zoom: CITY_VIEW.zoom,
        ui: { components: ["zoom", "attribution"] },
        popup: { dockEnabled: false }
      });

      view.padding = { top: 74 };
      view.ui.add(new Home({ view }), "top-left");
      view.ui.add(new Compass({ view }), "top-left");
      view.ui.add(new ScaleBar({ view, unit: "dual" }), "bottom-left");
      view.ui.add(new Search({ view, locationEnabled: false, allPlaceholder: "Search locations" }), { position: "top-left", index: 2 });

      /* ═══════════════════════════════════════════════════════
         MODE / TAB / VISIBILITY
         ═══════════════════════════════════════════════════════ */
      let mode = "city";
      let activeCityTab = "cityFoodRecoverySources";
      let activeCampusTab = "campusDining";

      const modeLayerIds = {
        city: ["foodRecovery", "redistribution", "beneficiary", "circular", "foodDeserts", "foodInsecurity"],
        campus: ["gtDining", "gtCompost", "gtVending", "gtRecycling"]
      };

      const cityTabDefs = [
        { id: "cityFoodRecoverySources", label: "Food Recovery Sources", layers: ["foodRecovery"] },
        { id: "cityRedistributionNodes", label: "Redistribution Nodes", layers: ["redistribution"] },
        { id: "cityBeneficiaryAccessPoints", label: "Beneficiary Access Points", layers: ["beneficiary", "foodDeserts", "foodInsecurity"] },
        { id: "cityCircularCompostNetwork", label: "Circular/Compost Network", layers: ["circular"] }
      ];

      const campusTabDefs = [
        { id: "campusDining", label: "Campus Dining", layers: ["gtDining"] },
        { id: "campusCompost", label: "Compost", layers: ["gtCompost"] },
        { id: "campusVending", label: "Vending", layers: ["gtVending"] },
        { id: "campusTrash", label: "Trash Cans", layers: ["gtRecycling"] },
        { id: "campusAll", label: "Campus All", layers: ["gtDining", "gtCompost", "gtVending", "gtRecycling"] }
      ];

      function getCheckbox(layerId) { return document.querySelector(`input[data-layer="${layerId}"]`); }
      function checkboxState(layerId) { const b = getCheckbox(layerId); return b ? b.checked : false; }
      function setCheckbox(layerId, state) { const b = getCheckbox(layerId); if (b) b.checked = state; }
      function tabDefsForMode() { return mode === "city" ? cityTabDefs : campusTabDefs; }
      function activeTabId() { return mode === "city" ? activeCityTab : activeCampusTab; }
      function setActiveTab(id) { if (mode === "city") activeCityTab = id; else activeCampusTab = id; }

      function setModeLayerSelection(layerIds) {
        const selected = new Set(layerIds);
        modeLayerIds[mode].forEach(id => setCheckbox(id, selected.has(id)));
      }

      function renderDock() {
        const dock = document.getElementById("dock");
        dock.innerHTML = "";
        const defs = tabDefsForMode();
        const active = activeTabId();
        defs.forEach(def => {
          const btn = document.createElement("button");
          btn.type = "button"; btn.textContent = def.label;
          btn.className = def.id === active ? "active" : "";
          btn.addEventListener("click", () => { setActiveTab(def.id); setModeLayerSelection(def.layers); applyVisibility(); renderDock(); });
          dock.appendChild(btn);
        });
      }

      function applyVisibility() {
        atlantaLayers.forEach(l => { l.visible = mode === "city" && checkboxState(l.id); });
        gtLayers.forEach(l => { l.visible = mode === "campus" && checkboxState(l.id); });
        gtBaseLayers.forEach(l => { l.visible = mode === "campus"; });
        atlantaBoundaryLayer.visible = mode === "city";
      }

      function applyActiveTabSelection() {
        const defs = tabDefsForMode();
        const target = defs.find(d => d.id === activeTabId()) || defs[0];
        setActiveTab(target.id);
        setModeLayerSelection(target.layers);
      }

      function setModeButtons() {
        document.getElementById("btnCity").classList.toggle("active", mode === "city");
        document.getElementById("btnCampus").classList.toggle("active", mode === "campus");
      }

      function switchToCity() { mode = "city"; setModeButtons(); applyActiveTabSelection(); applyVisibility(); renderDock(); view.goTo(CITY_VIEW).catch(() => {}); }
      function switchToCampus() { mode = "campus"; setModeButtons(); applyActiveTabSelection(); applyVisibility(); renderDock(); view.goTo(CAMPUS_VIEW).catch(() => {}); }

      document.getElementById("btnCity").addEventListener("click", switchToCity);
      document.getElementById("btnCampus").addEventListener("click", switchToCampus);

      document.querySelectorAll("input[data-layer]").forEach(box => {
        box.addEventListener("change", () => { setActiveTab(""); applyVisibility(); renderDock(); });
      });

      document.getElementById("showAll").addEventListener("click", () => { modeLayerIds[mode].forEach(id => setCheckbox(id, true)); setActiveTab(""); applyVisibility(); renderDock(); });
      document.getElementById("hideAll").addEventListener("click", () => { modeLayerIds[mode].forEach(id => setCheckbox(id, false)); setActiveTab(""); applyVisibility(); renderDock(); });
      document.getElementById("layersToggle").addEventListener("click", () => { document.getElementById("layerPanel").classList.toggle("open"); });

      // Clustering
      const clusterRules = [
        { layer: layers.foodRecovery, threshold: 12 }, { layer: layers.redistribution, threshold: 12 },
        { layer: layers.beneficiary, threshold: 12 }, { layer: layers.circular, threshold: 12 },
        { layer: layers.gtDining, threshold: 15 }, { layer: layers.gtCompost, threshold: 15 },
        { layer: layers.gtVending, threshold: 15 }, { layer: layers.gtRecycling, threshold: 15 }
      ];
      function updateClusters(zoom) {
        clusterRules.forEach(({ layer, threshold }) => {
          if (zoom < threshold && !layer.featureReduction) layer.featureReduction = clusterConfig();
          if (zoom >= threshold && layer.featureReduction) layer.featureReduction = null;
        });
      }

      /* ═══════════════════════════════════════════════════════
         INITIALIZATION
         ═══════════════════════════════════════════════════════ */
      view.when(() => {
        applyActiveTabSelection();
        applyVisibility();
        renderDock();
        updateClusters(view.zoom || CITY_VIEW.zoom);
      });

      view.watch("zoom", z => updateClusters(z));

      // Atlanta boundary spatial filter
      atlantaBoundaryLayer.when(() => {
        const query = atlantaBoundaryLayer.createQuery();
        query.returnGeometry = true;
        return atlantaBoundaryLayer.queryFeatures(query);
      }).then(result => {
        if (result.features.length > 0) {
          const atlantaGeom = result.features[0].geometry;
          atlantaLayers.forEach(layer => {
            view.whenLayerView(layer).then(lv => {
              lv.filter = { geometry: atlantaGeom, spatialRelationship: "intersects" };
            });
          });
        }
      }).catch(err => {
        console.warn("Atlanta boundary filter unavailable:", err.message);
      });

    });
  </script>
</body>
</html>
