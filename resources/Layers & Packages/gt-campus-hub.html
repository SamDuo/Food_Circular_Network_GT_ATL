<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GT Campus Food Hub — AFCN</title>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <!-- Mapbox Geocoder plugin -->
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" />
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════════════
       DESIGN TOKENS
       ═══════════════════════════════════════════════════════ */
    :root {
      --bg: #07090f;
      --surface: #111722;
      --surface-2: #19202e;
      --surface-3: #1e2738;
      --glass: rgba(17, 23, 34, 0.92);
      --glass-border: rgba(255,255,255,0.06);
      --teal: #00bfa5;
      --teal-dim: rgba(0,191,165,0.15);
      --teal-glow: rgba(0,191,165,0.3);
      /* Campus accent override — gold instead of teal */
      --accent: #b3a369;
      --accent-dim: rgba(179,163,105,0.15);
      --accent-glow: rgba(179,163,105,0.3);
      --critical: #ef5350;
      --soon: #ffc107;
      --stable: #66bb6a;
      --gold: #b3a369;
      --text: #e8edf4;
      --text-dim: #8d9bb5;
      --muted: #5a6a7e;
      --font: 'DM Sans', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

    /* ═══════════════════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════════════════ */
    #app {
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 380px 1fr;
      height: 100vh;
    }

    /* ═══════════════════════════════════════════════════════
       TOPBAR
       ═══════════════════════════════════════════════════════ */
    #topbar {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--glass-border);
      z-index: 100;
    }
    #brandWrap { display: flex; align-items: center; gap: 14px; }
    #titleWrap h1 {
      font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--accent), #d4c48a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #titleWrap .subtitle {
      font-size: 10px; color: var(--muted); letter-spacing: 0.5px;
      text-transform: uppercase; margin-top: 1px;
    }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      padding: 6px 14px; font-size: 11px; font-weight: 600;
      color: var(--text-dim); text-decoration: none;
      border-radius: 999px; letter-spacing: 0.3px;
      transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface-2); }
    .nav-link.active { color: #0a0c14; background: var(--accent); }

    /* ═══════════════════════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════════════════════ */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--glass-border);
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--surface-3) transparent;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }

    /* Search bar */
    .search-wrap {
      padding: 16px 16px 12px;
      position: sticky; top: 0;
      background: var(--surface);
      z-index: 10;
      border-bottom: 1px solid var(--glass-border);
    }
    .search-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface-2);
      border: 1px solid var(--glass-border);
      border-radius: 999px; padding: 0 14px; height: 40px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box svg { flex-shrink: 0; color: var(--muted); }
    .search-box input {
      flex: 1; border: none; outline: none; background: transparent;
      color: var(--text); font-family: var(--font); font-size: 13px;
    }
    .search-box input::placeholder { color: var(--muted); }
    #searchResults {
      position: absolute; left: 16px; right: 16px; top: 64px;
      background: var(--surface-3); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); max-height: 240px; overflow-y: auto;
      display: none; z-index: 20;
    }
    .search-result {
      padding: 10px 14px; cursor: pointer; font-size: 12px;
      border-bottom: 1px solid var(--glass-border);
      transition: background 0.15s;
    }
    .search-result:hover { background: var(--accent-dim); }
    .search-result .sr-name { font-weight: 600; color: var(--text); }
    .search-result .sr-loc { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* Section headers */
    .section-header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px 8px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted);
    }
    .section-header::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--glass-border), transparent);
    }

    /* ── Open Now Cards ── */
    .location-cards { padding: 4px 12px 8px; }
    .loc-card {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--surface-2);
      margin-bottom: 6px; cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .loc-card:hover { border-color: var(--accent); background: var(--surface-3); }
    .loc-card.closed { opacity: 0.45; }
    .loc-icon {
      width: 38px; height: 38px; border-radius: var(--radius-xs);
      background: var(--surface-3); display: flex; align-items: center;
      justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .loc-info { flex: 1; min-width: 0; }
    .loc-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .loc-meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .status-dot.open { background: var(--stable); box-shadow: 0 0 6px var(--stable); }
    .status-dot.closed { background: var(--critical); }
    .loc-hours { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

    /* ── Wait Times ── */
    .wait-grid { padding: 4px 12px 8px; }
    .wait-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-radius: var(--radius-xs);
      margin-bottom: 4px;
      background: var(--surface-2);
    }
    .wait-name { font-size: 12px; font-weight: 500; }
    .wait-time {
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
    }
    .wait-low  { color: var(--stable);   background: rgba(102,187,106,0.12); }
    .wait-med  { color: var(--soon);     background: rgba(255,193,7,0.12); }
    .wait-high { color: var(--critical); background: rgba(239,83,80,0.12); }

    /* ── Available Now / Surplus ── */
    .surplus-section { padding: 4px 12px 16px; }
    .surplus-card {
      background: var(--surface-2);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px; margin-bottom: 8px;
      position: relative; overflow: hidden;
      transition: all 0.2s;
    }
    .surplus-card:hover { border-color: var(--accent); }
    .surplus-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .surplus-card.urg-Critical::before { background: var(--critical); }
    .surplus-card.urg-Soon::before     { background: var(--soon); }
    .surplus-card.urg-Stable::before   { background: var(--stable); }
    .surplus-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .surplus-food { font-size: 13px; font-weight: 600; }
    .surplus-badge {
      font-size: 9px; font-weight: 700; padding: 2px 8px;
      border-radius: 999px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-Critical { background: rgba(239,83,80,0.15);  color: var(--critical); }
    .badge-Soon     { background: rgba(255,193,7,0.15);  color: var(--soon); }
    .badge-Stable   { background: rgba(102,187,106,0.15); color: var(--stable); }
    .surplus-detail {
      font-size: 11px; color: var(--text-dim); margin-bottom: 8px; line-height: 1.5;
    }
    .surplus-detail span { color: var(--text); font-weight: 600; }
    .surplus-actions { display: flex; gap: 6px; }
    .btn-claim {
      flex: 1; padding: 7px 0; font-size: 11px; font-weight: 700;
      border: none; border-radius: var(--radius-xs); cursor: pointer;
      font-family: var(--font); letter-spacing: 0.3px;
      background: var(--accent); color: #0a0c14;
      transition: all 0.2s;
    }
    .btn-claim:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-claim.claimed { background: var(--surface-3); color: var(--stable); pointer-events: none; }
    .btn-detail {
      padding: 7px 12px; font-size: 11px; font-weight: 600;
      border: 1px solid var(--glass-border); border-radius: var(--radius-xs);
      cursor: pointer; background: transparent; color: var(--text-dim);
      font-family: var(--font); transition: all 0.2s;
    }
    .btn-detail:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Surplus summary stats ── */
    .surplus-summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
      padding: 4px 12px 10px;
    }
    .summary-stat {
      text-align: center; padding: 10px 4px;
      background: var(--surface-2); border-radius: var(--radius-xs);
      border: 1px solid var(--glass-border);
    }
    .summary-val   { font-size: 20px; font-weight: 800; color: var(--accent); }
    .summary-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* ═══════════════════════════════════════════════════════
       MAP CONTAINER
       ═══════════════════════════════════════════════════════ */
    #mapContainer { position: relative; }
    #map { width: 100%; height: 100%; }

    /* Map overlays */
    .map-overlay-badge {
      position: absolute; top: 12px; right: 12px; z-index: 5;
      display: flex; gap: 8px;
    }
    .map-badge {
      font-size: 10px; font-weight: 700;
      padding: 6px 12px; border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      color: var(--text-dim);
      display: flex; align-items: center; gap: 6px;
    }
    .map-badge .pulse-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--stable);
      box-shadow: 0 0 8px var(--stable);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }

    /* Mapbox popup custom */
    .mapboxgl-popup-content {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--glass-border) !important;
      border-radius: var(--radius-sm) !important;
      padding: 14px !important;
      font-family: var(--font) !important;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
      max-width: 280px !important;
    }
    .mapboxgl-popup-tip { border-top-color: var(--surface) !important; }
    .mapboxgl-popup-close-button { color: var(--muted) !important; font-size: 18px !important; }
    .popup-title  { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .popup-menu   { font-size: 11px; color: var(--text-dim); line-height: 1.6; }
    .popup-menu b { color: var(--accent); }
    .popup-status { margin-top: 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; }

    /* ── Food Truck floating card ── */
    #foodTruckCard {
      position: absolute; bottom: 16px; left: 16px; z-index: 5;
      background: var(--glass); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 16px;
      width: 260px; display: none;
    }
    .ft-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .ft-icon  { font-size: 24px; }
    .ft-title { font-size: 14px; font-weight: 700; }
    .ft-subtitle { font-size: 10px; color: var(--muted); }
    .ft-menu-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid var(--glass-border); font-size: 12px;
    }
    .ft-menu-item:last-child { border-bottom: none; }
    .ft-price { color: var(--accent); font-weight: 700; font-family: var(--mono); }

    /* ═══════════════════════════════════════════════════════
       CUSTOM MAP MARKERS
       ═══════════════════════════════════════════════════════ */
    .marker-dining {
      width: 32px; height: 32px;
      background: var(--teal);
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 2px 12px rgba(0,191,165,0.4);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .marker-dining:hover { transform: scale(1.2); }
    .marker-dining.closed-marker { background: var(--muted); box-shadow: 0 2px 8px rgba(0,0,0,0.3); opacity: 0.6; }

    .marker-surplus {
      min-width: 36px; height: auto;
      padding: 3px 8px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: #fff;
      cursor: pointer;
      transition: transform 0.2s;
      white-space: nowrap;
    }
    .marker-surplus:hover { transform: scale(1.15); }
    .marker-surplus.critical  { background: var(--critical); box-shadow: 0 0 12px rgba(239,83,80,0.5); animation: pulse 2s infinite; }
    .marker-surplus.soon      { background: var(--soon);     box-shadow: 0 0 8px rgba(255,193,7,0.3); }
    .marker-surplus.stable-m  { background: var(--stable);   box-shadow: 0 0 8px rgba(102,187,106,0.3); }

    /* ═══════════════════════════════════════════════════════
       LOADING SHIMMER
       ═══════════════════════════════════════════════════════ */
    .loading-shimmer {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: var(--radius-xs);
      height: 48px; margin-bottom: 6px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ═══════════════════════════════════════════════════════
       MOBILE
       ═══════════════════════════════════════════════════════ */
    @media (max-width: 820px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: 52px 45vh 1fr;
      }
      #topbar { padding: 0 12px; }
      #titleWrap h1 { font-size: 14px; }
      .nav-links { gap: 2px; }
      .nav-link { font-size: 10px; padding: 5px 10px; }
      #sidebar { border-right: none; border-top: 1px solid var(--glass-border); }
      #mapContainer { grid-row: 2; }
      #sidebar { grid-row: 3; }
    }

    /* ── Geocoder override ── */
    .mapboxgl-ctrl-geocoder {
      background: var(--surface-2) !important;
      border: 1px solid var(--glass-border) !important;
      border-radius: 999px !important;
      box-shadow: none !important;
      font-family: var(--font) !important;
      width: 100% !important; max-width: 100% !important; min-width: unset !important;
    }
    .mapboxgl-ctrl-geocoder input {
      color: var(--text) !important; font-family: var(--font) !important;
      font-size: 13px !important; height: 40px !important;
    }
    .mapboxgl-ctrl-geocoder input::placeholder { color: var(--muted) !important; }
    .mapboxgl-ctrl-geocoder .mapboxgl-ctrl-geocoder--icon { fill: var(--muted) !important; }
    .mapboxgl-ctrl-geocoder .suggestions {
      background: var(--surface) !important;
      border: 1px solid var(--glass-border) !important;
      border-radius: var(--radius-sm) !important;
      font-family: var(--font) !important;
    }
    .mapboxgl-ctrl-geocoder .suggestions li a { color: var(--text) !important; font-size: 12px !important; }
    .mapboxgl-ctrl-geocoder .suggestions .active > a,
    .mapboxgl-ctrl-geocoder .suggestions li a:hover { background: var(--accent-dim) !important; }
    /* remove map control wrapper spacing */
    .geocoder-sidebar-wrap .mapboxgl-ctrl { margin: 0 !important; box-shadow: none !important; width: 100%; }
    .geocoder-sidebar-wrap { padding: 0 12px 12px; }

    /* ── Navigation panel ── */
    .nav-panel { padding: 4px 12px 16px; }
    .nav-origin {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: var(--radius-xs);
      background: var(--surface-2); margin-bottom: 8px;
      border-left: 3px solid var(--accent);
    }
    .nav-origin-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent-glow);
      flex-shrink: 0;
    }
    .nav-origin-text { font-size: 11px; }
    .nav-origin-text strong { color: var(--text); font-size: 12px; display: block; }
    .nav-origin-text span  { color: var(--muted); font-size: 10px; }
    .nav-profile-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .nav-profile-btn {
      flex: 1; padding: 8px 0; font-size: 11px; font-weight: 700;
      border: 1px solid var(--glass-border); border-radius: var(--radius-xs);
      background: var(--surface-2); color: var(--text-dim);
      cursor: pointer; font-family: var(--font); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .nav-profile-btn.active { background: var(--accent); color: #0a0c14; border-color: var(--accent); }
    .nav-dest-select {
      width: 100%; padding: 9px 12px; border-radius: var(--radius-xs);
      background: var(--surface-2); border: 1px solid var(--glass-border);
      color: var(--text); font-family: var(--font); font-size: 12px;
      cursor: pointer; margin-bottom: 8px; outline: none;
    }
    .nav-dest-select:focus { border-color: var(--accent); }
    .btn-route {
      width: 100%; padding: 9px 0; font-size: 12px; font-weight: 700;
      border: none; border-radius: var(--radius-xs);
      background: var(--accent); color: #0a0c14;
      cursor: pointer; font-family: var(--font); transition: all 0.2s;
    }
    .btn-route:hover { filter: brightness(1.1); }
    .btn-route:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
    .route-info {
      display: none; gap: 6px; margin-top: 8px;
    }
    .route-stat {
      flex: 1; text-align: center; padding: 8px 4px;
      background: var(--surface-2); border-radius: var(--radius-xs);
      border: 1px solid var(--glass-border);
    }
    .route-val   { font-size: 17px; font-weight: 800; color: var(--accent); display: block; }
    .route-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .nav-status  { font-size: 11px; color: var(--muted); margin-top: 6px; min-height: 16px; }
    .btn-clear-route {
      width: 100%; padding: 6px 0; font-size: 11px; font-weight: 600;
      border: 1px solid var(--glass-border); border-radius: var(--radius-xs);
      background: transparent; color: var(--text-dim); cursor: pointer;
      font-family: var(--font); margin-top: 6px; transition: all 0.2s; display: none;
    }
    .btn-clear-route:hover { border-color: var(--critical); color: var(--critical); }

  </style>
</head>

<body>
<div id="app">

  <!-- ═══ TOPBAR ═══ -->
  <header id="topbar">
    <div id="brandWrap">
      <div id="titleWrap">
        <h1>GT Campus Food Hub</h1>
        <div class="subtitle">Atlanta Food Circular Network · I2CE Lab</div>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html"          class="nav-link">AFCN Map</a>
      <a href="surplus-map.html"    class="nav-link">Surplus</a>
      <a href="gt-campus-hub.html"  class="nav-link active">Campus Hub</a>
      <a href="fleet-analytics.html" class="nav-link">Fleet</a>
    </nav>
  </header>

  <!-- ═══ SIDEBAR ═══ -->
  <div id="sidebar">
    <!-- Geocoder: location search -->
    <div class="geocoder-sidebar-wrap" id="geocoderWrap"></div>

    <!-- Dining item search (existing) -->
    <div class="search-wrap">

const HINMAN = { lat: 33.7712, lng: -84.3878, name: 'Hinman Building' };
let navProfile = 'walking';
let activeRouteDestMarker = null;

async function fetchRoute(destLng, destLat) {
  const status = document.getElementById('navStatus');
  const info   = document.getElementById('routeInfo');
  const btn    = document.getElementById('btnGetRoute');
  status.textContent = 'Fetching route…';
  btn.disabled = true;
  try {
    const url = `https://api.mapbox.com/directions/v5/mapbox/${navProfile}/` +
      `${HINMAN.lng},${HINMAN.lat};${destLng},${destLat}` +
      `?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (!data.routes || !data.routes.length) {
      status.textContent = 'No route found.';
      btn.disabled = false;
      return;
    }
    const route = data.routes[0];
    const dist  = route.distance;
    const dur   = route.duration;
    // Draw route
    if (map.getSource('route')) {
      map.getSource('route').setData({ type: 'Feature', geometry: route.geometry });
    }
    // Stats
    document.getElementById('routeDist').textContent =
      dist > 1000 ? `${(dist / 1000).toFixed(1)} km` : `${Math.round(dist)} m`;
    document.getElementById('routeTime').textContent =
      dur >= 3600 ? `${Math.floor(dur / 3600)}h ${Math.floor((dur % 3600) / 60)}m` : `${Math.ceil(dur / 60)} min`;
    info.style.display = 'flex';
    document.getElementById('btnClearRoute').style.display = 'block';
    status.textContent = `Route via ${navProfile} · ${navProfile === 'walking' ? '🚶' : '🚴'}`;
    // Fly to show full route
    const coords = route.geometry.coordinates;
    const lngs   = coords.map(c => c[0]);
    const lats   = coords.map(c => c[1]);
    map.fitBounds([[Math.min(...lngs), Math.min(...lats)], [Math.max(...lngs), Math.max(...lats)]], { padding: 60, duration: 1000 });
  } catch (e) {
    status.textContent = 'Route unavailable (check connection).';
    console.error('Directions error:', e);
  }
  btn.disabled = false;
}

function clearRoute() {
  if (map.getSource('route')) {
    map.getSource('route').setData({ type: 'FeatureCollection', features: [] });
  }
  document.getElementById('routeInfo').style.display = 'none';
  document.getElementById('btnClearRoute').style.display = 'none';
  document.getElementById('navStatus').textContent = '';
}

        map.setPaintProperty('route-line', 'line-dasharray',
          navProfile === 'walking' ? [2, 1.5] : [1]);

  });

  });

  document.getElementById('btnClearRoute').addEventListener('click', clearRoute);

// API KEY — fetched from serve.py /api/config, falls back to public key
// ══════════════════════════════════════════════════════════════
const MAPBOX_PUBLIC_FALLBACK = '';

async function getMapboxToken() {
  try {
    const res = await fetch('/api/config');
    if (res.ok) {
      const cfg = await res.json();
      if (cfg.mapboxPublicKey) return cfg.mapboxPublicKey;
    }
  } catch (_) {}
  console.warn('Using fallback Mapbox key — configure /api/config for production');
  return MAPBOX_PUBLIC_FALLBACK;
}

// ══════════════════════════════════════════════════════════════
// NUTRISLICE API
// ══════════════════════════════════════════════════════════════
const NS_API = 'https://techdining.api.nutrislice.com';
let allMenuData = {};

async function fetchMenuForLocation(slug, menuType) {
  const today = new Date();
  const y = today.getFullYear(), m = today.getMonth() + 1, d = today.getDate();
  const url = `${NS_API}/menu/api/weeks/school/${slug}/menu-type/${menuType.toLowerCase()}/${y}/${m}/${d}/?format=json`;
  try {
    const res = await fetch(url);
    if (!res.ok) return { error: true, items: [] };
    const data = await res.json();
    const todayStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayData = data.days?.find(day => day.date === todayStr);
    if (!dayData) return { error: true, items: [] };
    const items = dayData.menu_items
      .filter(item => item.food && item.food.name)
      .map(item => ({ name: item.food.name, category: item.food.food_category || '', station: item.station || '' }));
    return { error: false, items };
  } catch (e) {
    console.warn(`Menu fetch failed for ${slug}/${menuType}:`, e);
    return { error: true, items: [] };
  }
}

async function loadAllMenus() {
  const mealType = getCurrentMealType();
  const promises = DINING_LOCATIONS
    .filter(loc => loc.menus.length)
    .map(loc => {
      const menuSlug = loc.menus.includes(mealType) ? mealType : loc.menus[0];
      return fetchMenuForLocation(loc.slug, menuSlug)
        .then(result => { allMenuData[loc.slug] = { items: result.items, error: result.error, mealType: menuSlug }; });
    });
  await Promise.allSettled(promises);
}

function getCurrentMealType() {
  const etStr = new Date().toLocaleString('en-US', { timeZone: 'America/New_York', hour12: false });
  const h = new Date(etStr).getHours();
  if (h < 10) return 'Breakfast';
  if (h < 16) return 'Lunch';
  return 'Dinner';
}

// ══════════════════════════════════════════════════════════════
// TIME / STATUS HELPERS
// ══════════════════════════════════════════════════════════════

function isLocationOpen(loc) {
  const etStr = new Date().toLocaleString('en-US', { timeZone: 'America/New_York', hour12: false });
  const etDate = new Date(etStr);
  const nowMin = etDate.getHours() * 60 + etDate.getMinutes();
  if (!loc.monStart || !loc.monEnd) return false;
  const [sh, sm] = loc.monStart.split(':').map(Number);
  const [eh, em] = loc.monEnd.split(':').map(Number);
  const startMin = sh * 60 + sm;
  let endMin = eh * 60 + em;
  if (endMin < startMin) endMin += 1440; // past midnight
  const checkMin = nowMin < startMin ? nowMin + 1440 : nowMin;
  return checkMin >= startMin && checkMin <= endMin;
}

function getClosingTime(loc) { return loc.monEnd || '—'; }

function estimateWait(loc) {
  const etStr = new Date().toLocaleString('en-US', { timeZone: 'America/New_York', hour12: false });
  const etDate = new Date(etStr);
  const h = etDate.getHours();
  const seed = (h * 60 + Math.floor(etDate.getMinutes() / 5)) * 31 + loc.name.length;
  const prand = ((seed * 9301 + 49297) % 233280) / 233280;
  const peak = (h >= 11 && h <= 13) || (h >= 17 && h <= 19);
  if (loc.type === 'dining-hall') return peak ? Math.floor(prand * 6) + 8 : Math.floor(prand * 4) + 2;
  if (loc.type === 'retail') return peak ? Math.floor(prand * 5) + 5 : Math.floor(prand * 3) + 1;
  return Math.floor(prand * 4) + 1;
}

function renderLocationCards() {
  const container = document.getElementById('locationCards');
  const open   = DINING_LOCATIONS.filter(l =>  isLocationOpen(l));
  const closed = DINING_LOCATIONS.filter(l => !isLocationOpen(l));

  container.innerHTML = [...open, ...closed].map(loc => {
    const isOpen    = isLocationOpen(loc);
    const menuData  = allMenuData[loc.slug];
    const itemCount = menuData ? menuData.items.length : 0;
    const mealLabel = menuData ? menuData.mealType : '';
    const menuError = menuData && menuData.error;
    const menuInfo  = menuError ? ' · <span style="color:var(--soon)">Menu unavailable</span>'
                    : itemCount ? ` · ${itemCount} items (${mealLabel})` : '';
    return `
      <div class="loc-card ${isOpen ? '' : 'closed'}" data-lat="${loc.lat}" data-lng="${loc.lng}">
        <div class="loc-icon">${loc.icon}</div>
        <div class="loc-info">
          <div class="loc-name">${loc.name}</div>
          <div class="loc-meta">
            <span class="status-dot ${isOpen ? 'open' : 'closed'}"></span>
            ${isOpen ? 'Open' : 'Closed'}
            ${isOpen ? `· closes ${getClosingTime(loc)}` : ''}
            ${menuInfo}
          </div>
        </div>
        <div class="loc-hours">${isOpen ? getClosingTime(loc) : '—'}</div>
      </div>`;
  }).join('');

  container.querySelectorAll('.loc-card').forEach(card => {
    card.addEventListener('click', () => {
      if (map) map.flyTo({ center: [+card.dataset.lng, +card.dataset.lat], zoom: 17.5, pitch: 45, bearing: -20, duration: 1200 });
    });
  });
}

function renderWaitTimes() {
  const container = document.getElementById('waitGrid');
  const openLocs  = DINING_LOCATIONS.filter(l => isLocationOpen(l));
  if (!openLocs.length) {
    container.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--muted);">All locations currently closed</div>';
    return;
  }
  container.innerHTML = openLocs.map(loc => {
    const wait = estimateWait(loc);
    const cls  = wait <= 3 ? 'wait-low' : wait <= 7 ? 'wait-med' : 'wait-high';
    return `<div class="wait-row">
      <span class="wait-name">${loc.icon} ${loc.name}</span>
      <span class="wait-time ${cls}">~${wait} min</span>
    </div>`;
  }).join('');
}

function renderSurplusCards() {
  const container = document.getElementById('surplusCards');
  const sorted = [...MOCK_SURPLUS].sort((a, b) => {
    const order = { Critical: 0, Soon: 1, Stable: 2 };
    return (order[a.urgency] ?? 3) - (order[b.urgency] ?? 3) || b.quantity_lbs - a.quantity_lbs;
  });

  container.innerHTML = sorted.map(item => {
    const expTime = new Date(item.expiration);
    const nowMs = Date.now();
    const minsLeft = Math.round((expTime - nowMs) / 60000);
    const expLabel = minsLeft <= 0 ? 'EXPIRED' : minsLeft < 60 ? minsLeft + ' min left' : Math.floor(minsLeft / 60) + 'h ' + (minsLeft % 60) + 'm left';
    const expColor = minsLeft <= 0 ? 'var(--critical)' : minsLeft < 120 ? 'var(--soon)' : 'var(--stable)';
    return `
    <div class="surplus-card urg-${item.urgency}" data-id="${item.id}" data-lat="${item.lat}" data-lng="${item.lng}">
      <div class="surplus-top">
        <div class="surplus-food">${item.food_type}</div>
        <span class="surplus-badge badge-${item.urgency}">${item.urgency}</span>
      </div>
      <div class="surplus-detail">
        <span>${item.quantity_lbs} lbs</span> · ${item.name}<br/>
        ${item.notes} · $${item.cost_usd.toFixed(0)} value<br/>
        Transport: ${item.transport}
        <div style="color:${expColor};font-weight:700;font-size:11px;margin-top:2px">${expLabel}</div>
      </div>
      <div class="surplus-actions">
        <button class="btn-claim" onclick="claimItem(this, ${item.id})">Claim Pickup</button>
        <button class="btn-detail" onclick="flyToSurplus(${item.lat}, ${item.lng})">📍 Map</button>
      </div>
    </div>`;
  }).join('');

  const totalLbs  = MOCK_SURPLUS.reduce((s, i) => s + i.quantity_lbs, 0);
  const totalCost = MOCK_SURPLUS.reduce((s, i) => s + i.cost_usd, 0);
  document.getElementById('totalLbs').textContent   = Math.round(totalLbs);
  document.getElementById('totalItems').textContent = MOCK_SURPLUS.length;
  document.getElementById('totalCost').textContent  = `$${Math.round(totalCost)}`;
}

function claimItem(btn, itemId) {
  btn.textContent = '✓ Claimed';
  btn.classList.add('claimed');
}

function flyToSurplus(lat, lng) {
  if (map) map.flyTo({ center: [lng, lat], zoom: 17, pitch: 45, duration: 800 });
}

// ══════════════════════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════════════════════

function initSearch() {
  const input   = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (q.length < 2) { results.style.display = 'none'; return; }

    let matches = [];
    for (const [slug, data] of Object.entries(allMenuData)) {
      const loc = DINING_LOCATIONS.find(l => l.slug === slug);
      for (const item of data.items) {
        if (item.name.toLowerCase().includes(q))
          matches.push({ name: item.name, loc: loc?.name || slug, lat: loc?.lat, lng: loc?.lng });
      }
    }
    for (const loc of DINING_LOCATIONS) {
      if (loc.name.toLowerCase().includes(q))
        matches.push({ name: loc.name, loc: `${loc.icon} ${loc.type}`, lat: loc.lat, lng: loc.lng });
    }
    for (const item of MOCK_SURPLUS) {
      if (item.food_type.toLowerCase().includes(q) || item.notes.toLowerCase().includes(q))
        matches.push({ name: `${item.food_type} (${item.quantity_lbs} lbs)`, loc: item.name, lat: item.lat, lng: item.lng });
    }

    matches = matches.slice(0, 8);
    if (!matches.length) { results.style.display = 'none'; return; }
    results.style.display = 'block';
    results.innerHTML = matches.map(m => `
      <div class="search-result" data-lat="${m.lat}" data-lng="${m.lng}">
        <div class="sr-name">${m.name}</div>
        <div class="sr-loc">${m.loc}</div>
      </div>`).join('');
    results.querySelectorAll('.search-result').forEach(el => {
      el.addEventListener('click', () => {
        if (map) map.flyTo({ center: [+el.dataset.lng, +el.dataset.lat], zoom: 17.5, pitch: 45, duration: 1000 });
        results.style.display = 'none';
        input.value = el.querySelector('.sr-name').textContent;
      });
    });
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) results.style.display = 'none';
  });
}

// ══════════════════════════════════════════════════════════════
// MAPBOX — standard dark campus map (no 3D extrusion)
// ══════════════════════════════════════════════════════════════
let map;

function initMap(token) {
  mapboxgl.accessToken = token;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-84.3963, 33.7748],
    zoom: 15.5,
    pitch: 40,
    bearing: -12,
    antialias: true,
  });

  map.addControl(new mapboxgl.NavigationControl({ showCompass: true }), 'bottom-right');

  map.on('style.load', () => {
    // Subtle atmosphere tint
    map.setFog({
      color: '#07090f',
      'high-color': '#0a1525',
      'horizon-blend': 0.06,
      'space-color': '#07090f',
      'star-intensity': 0.1,
    });
    addMarkers();

    // Route source + layers (for navigation)
    map.addSource('route', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [] },
    });
    map.addLayer({
      id: 'route-glow',
      type: 'line',
      source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': '#b3a369', 'line-width': 8, 'line-opacity': 0.25 },
    });
    map.addLayer({
      id: 'route-line',
      type: 'line',
      source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: {
        'line-color': '#b3a369',
        'line-width': 4,
        'line-opacity': 0.95,
        'line-dasharray': [2, 1.5],
      },
    });

    // Hinman Building origin marker
    const hinmanEl = document.createElement('div');
    hinmanEl.style.cssText =
      'width:14px;height:14px;border-radius:50%;background:#b3a369;border:3px solid white;' +
      'box-shadow:0 0 14px rgba(179,163,105,0.7);cursor:pointer;';
    new mapboxgl.Marker({ element: hinmanEl })
      .setLngLat([HINMAN.lng, HINMAN.lat])
      .setPopup(new mapboxgl.Popup({ offset: 16 }).setHTML(
        '<div class="popup-title">📍 Hinman Building</div>' +
        '<div class="popup-menu">Navigation origin for Campus Hub</div>'
      ))
      .addTo(map);

  });
}

function clusterSurplusByLocation(items) {
  const groups = {};
  for (const item of items) {
    const key = item.lat + ',' + item.lng;
    if (!groups[key]) {
      groups[key] = { lat: item.lat, lng: item.lng, name: item.name, items: [], totalLbs: 0, totalCost: 0, maxUrgency: 'Stable' };
    }
    groups[key].items.push(item);
    groups[key].totalLbs += item.quantity_lbs;
    groups[key].totalCost += item.cost_usd;
    const urgOrder = { Critical: 0, Soon: 1, Stable: 2 };
    if (urgOrder[item.urgency] < urgOrder[groups[key].maxUrgency]) {
      groups[key].maxUrgency = item.urgency;
    }
  }
  return Object.values(groups);
}

function addMarkers() {
  // Dining location markers
  for (const loc of DINING_LOCATIONS) {
    const isOpen = isLocationOpen(loc);
    const el = document.createElement('div');
    el.className = `marker-dining ${isOpen ? '' : 'closed-marker'}`;
    el.innerHTML = loc.icon;
    el.title = loc.name;

    const menuData = allMenuData[loc.slug];
    let popupHTML  = `<div class="popup-title">${loc.name}</div>`;
    if (menuData && menuData.items.length) {
      const items = menuData.items.slice(0, 8).map(i => i.name).join(', ');
      popupHTML += `<div class="popup-menu"><b>${menuData.mealType} Menu:</b><br/>${items}</div>`;
    }
    popupHTML += `<div class="popup-status" style="color:${isOpen ? 'var(--stable)' : 'var(--critical)'}">
      ${isOpen ? '● Open until ' + getClosingTime(loc) : '● Closed'}</div>`;

    new mapboxgl.Marker({ element: el })
      .setLngLat([loc.lng, loc.lat])
      .setPopup(new mapboxgl.Popup({ offset: 20, closeButton: true }).setHTML(popupHTML))
      .addTo(map);
  }

  // Clustered surplus markers
  const surplusClusters = clusterSurplusByLocation(MOCK_SURPLUS);
  for (const cluster of surplusClusters) {
    const el = document.createElement('div');
    const urgCls = cluster.maxUrgency === 'Critical' ? 'critical' : cluster.maxUrgency === 'Soon' ? 'soon' : 'stable-m';
    el.className = 'marker-surplus ' + urgCls;
    const totalRounded = Math.round(cluster.totalLbs);
    el.textContent = totalRounded + ' lbs';
    el.title = cluster.name + ' \u2014 ' + totalRounded + ' lbs (' + cluster.items.length + ' items)';

    const itemRows = cluster.items
      .sort((a, b) => {
        const urg = { Critical: 0, Soon: 1, Stable: 2 };
        return (urg[a.urgency] - urg[b.urgency]) || (b.quantity_lbs - a.quantity_lbs);
      })
      .map(item => '<div style="margin-bottom:4px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.06)">' +
        '<b>' + item.food_type + '</b> \u00b7 ' + item.quantity_lbs + ' lbs ' +
        '<span style="color:' + (item.urgency === 'Critical' ? 'var(--critical)' : item.urgency === 'Soon' ? 'var(--soon)' : 'var(--stable)') + '">\u25cf ' + item.urgency + '</span><br/>' +
        '<span style="color:var(--text-dim)">' + item.notes + ' \u00b7 $' + item.cost_usd.toFixed(0) + '</span>' +
        '</div>').join('');

    const popupHTML = '<div class="popup-title">' + cluster.name + '</div>' +
      '<div style="font-size:13px;font-weight:700;margin:4px 0;color:var(--accent)">' +
      totalRounded + ' lbs total \u00b7 ' + cluster.items.length + ' items \u00b7 $' + Math.round(cluster.totalCost) +
      '</div>' +
      '<div class="popup-menu" style="max-height:200px;overflow-y:auto">' + itemRows + '</div>';

    new mapboxgl.Marker({ element: el })
      .setLngLat([cluster.lng, cluster.lat])
      .setPopup(new mapboxgl.Popup({ offset: 20, closeButton: true, maxWidth: '320px' }).setHTML(popupHTML))
      .addTo(map);
  }
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
(async function init() {
  const token = await getMapboxToken();
  initMap(token);
  initSearch();
  initNavPanel();

  // Geocoder in sidebar (location search)
  map.on('load', () => {
    const geocoder = new MapboxGeocoder({
      accessToken: token,
      mapboxgl: mapboxgl,
      bbox: [-84.42, 33.755, -84.37, 33.795],
      placeholder: 'Search campus location…',
      marker: { color: '#b3a369' },
    });
    document.getElementById('geocoderWrap').appendChild(geocoder.onAdd(map));
  });

  await loadAllMenus();
  renderLocationCards();
  renderWaitTimes();
  renderSurplusCards();
})();
</script>
